<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>VEIL</title>
<!-- installable / fullscreen on mobile: "Add to Home Screen" launches without the browser toolbar -->
<meta name="theme-color" content="#04050c" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="VEIL" />
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="apple-touch-icon" href="/icon-180.png" />
<style>
  :root {
    --sat: env(safe-area-inset-top);
    --sab: env(safe-area-inset-bottom);
    --sal: env(safe-area-inset-left);
    --sar: env(safe-area-inset-right);
  }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #04050c;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }
  body {
    position: fixed;
    inset: 0;
    font-family: 'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
  }
  #wrap { position: relative; line-height: 0; }
  canvas {
    display: block;
    touch-action: none;
  }
  /* branded splash — paints instantly (before the JS bundle), then fades to the menu */
  #splash {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #04050c;
    transition: opacity .6s ease;
  }
  #splash.hide { opacity: 0; pointer-events: none; }
  #splash span {
    font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
    font-weight: 700; font-size: 13vw; letter-spacing: .36em;
    padding-left: .36em; /* offset trailing letter-spacing to stay centred */
    color: #eafaff;
    text-shadow: 0 0 24px #6fd8ff, 0 0 64px rgba(111,216,255,.5);
    opacity: 0; animation: splashIn 1.1s ease forwards;
  }
  #splash em {
    font-family: 'Space Mono', 'Space Grotesk', system-ui, sans-serif; font-style: normal;
    font-weight: 700; font-size: 3.4vw; letter-spacing: .42em; color: #8fa6c8;
    opacity: 0; animation: tapPulse 1.6s ease .3s infinite;
  }
  @keyframes splashIn {
    0%   { opacity: 0; transform: scale(.96); filter: blur(7px); }
    45%  { opacity: 1; filter: blur(0); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes tapPulse { 0%,100% { opacity: .35; } 50% { opacity: .9; } }
</style>
</head>
<body>
  <div id="wrap"><canvas id="game"></canvas></div>
  <div id="splash"><em>tap to begin</em></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
